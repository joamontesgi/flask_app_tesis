{% extends 'masterpage.html' %}
{% block contenido %}
<p class="step-label"><span class="step-num">Paso 2</span> PCAP a CSV</p>
{% if mensaje %}
<p class="text-center flash-inline mb-0">{{ mensaje }}</p>
{% endif %}
<div class="page-card">
    <form action="/convert_to_csv" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="archivo" class="form-label">Archivo .PCAP</label>
            <input class="form-control" type="file" name="pcap" id="archivo" required accept=".pcap, .PCAP">
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-primary" value="Upload">Cargar archivo</button>
        </div>
    </form>
</div>
{% endblock %}
