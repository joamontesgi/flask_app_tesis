<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema para detectar ataques DDoS mediante aprendizaje automático">
    <title>{% block title %}.:: Detección de ataques DDoS ::.{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body class="app-body">
    <a class="visually-hidden-focusable skip-link" href="#main-content">Ir al contenido</a>
    <header class="app-header">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container-fluid px-lg-4">
                <a class="navbar-brand fw-semibold" href="{{ url_for('template') }}">Inicio</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menú">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-lg-2">
                        <li class="nav-item">
                            <a class="nav-link" href="/form">Capturar tramas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/load_pcap">Convertir a CSV</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/convert">Analizar y obtener resultados</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content" class="app-main container py-4 py-lg-5{% block main_modifiers %}{% endblock %}">
        {% block contenido %}
        {% endblock %}
    </main>

    <footer class="app-footer mt-auto">
        <div class="app-footer-inner text-center py-4">
            <p class="mb-1 small mb-0">© 2022 Derechos reservados</p>
            <a class="footer-link small" href="https://mdbootstrap.com/" rel="noopener noreferrer">Template desarrollador por: MDBootstrap.com</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
