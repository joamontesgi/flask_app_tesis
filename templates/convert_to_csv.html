{% extends 'masterpage.html' %}
{% block contenido %}
<p class="step-label"><span class="step-num">Paso 3</span> Análisis y resultados</p>
{% if mensaje %}
<p class="text-center flash-inline mb-0">{{ mensaje }}</p>
{% endif %}
<div class="page-card">
    <form action="/models" method="post" class="mt-2" enctype="multipart/form-data">
        <div class="mb-4">
            <label for="archivo" class="form-label">Archivo CSV</label>
            <input class="form-control" type="file" name="csv" id="archivo" accept=".csv, .CSV" required>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-primary" name="trafico" id="normalizar" value="1">Obtener resultados (dashboard)</button>
        </div>
    </form>
</div>
{% endblock %}
